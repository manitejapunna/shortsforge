line-length = 120

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "S",   # flake8-bandit (security)
    "ASYNC", # flake8-async
    "RUF", # ruff-specific rules
    "UP",  # pyupgrade
    "C4",  # flake8-comprehensions
]
ignore = [
    "S101", # assert statements in tests
    "S603", # subprocess calls (we validate ourselves in security.paths)
    "S607", # partial executable paths are validated by ffmpeg helper/path policy
    "S608", # static SQL strings in local/session utilities
    "ASYNC109", # timeout arg pattern is acceptable in this codebase
    "ASYNC221", # subprocess usage is intentional in media pipelines
    "ASYNC230", # local file IO in async wrappers is accepted for now
    "ASYNC240", # pathlib usage in async wrappers is accepted for now
    "RUF002", # allow existing Unicode punctuation in docstrings/text
]

[lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S106", "S311"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
