name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  quality:
    name: Lint & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check src/

      - name: Bandit security scan
        run: uv run bandit -r src/ -ll -x src/shortsforge/security/

      - name: Detect secrets
        run: |
          if [ -f .secrets.baseline ]; then
            uv run detect-secrets-hook --baseline .secrets.baseline
          else
            uv run detect-secrets scan --all-files > .secrets.ci.baseline
            uv run detect-secrets-hook --baseline .secrets.ci.baseline
          fi

      - name: Pip audit
        run: uv run pip-audit

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

      - name: Generate SBOM
        run: uv run cyclonedx-py environment -o sbom.json --format json
        continue-on-error: true

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
        if: always()
